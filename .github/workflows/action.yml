name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        cd age_calculator
        pip install -r requirements.txt

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Log in to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      id: docker_build
      run: |
        IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/age_calculator
        TAG=${{ github.sha }}
        docker build -t $IMAGE_NAME:$TAG .
        docker push $IMAGE_NAME:$TAG
        echo "::set-output name=tag::$TAG"

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      id: docker_build
      run: |
        IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/age_calculator
        TAG=${{ github.sha }}
        docker build -t $IMAGE_NAME:$TAG .
        docker push $IMAGE_NAME:$TAG
        echo "::set-output name=tag::$TAG"

    - name: Pull and tag Docker image
      run: |
        IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/age_calculator
        TAG=${{ steps.docker_build.outputs.tag }}
        RELEASE_TAG=${{ github.event.release.tag_name || '' }}
        if [[ -n "$RELEASE_TAG" ]]; then
          docker pull $IMAGE_NAME:$TAG
          docker tag $IMAGE_NAME:$TAG $IMAGE_NAME:$RELEASE_TAG
          docker push $IMAGE_NAME:$RELEASE_TAG
        else
          echo "Skipping pull and tag steps as the workflow is not triggered by a release event."
        fi